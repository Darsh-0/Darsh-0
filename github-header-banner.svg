<svg width="1200" height="280" viewBox="0 0 1200 280" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Darsh Gandhi — Software Engineer, University of Canterbury">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#121729"/>
      <stop offset="55%" stop-color="#171D36"/>
      <stop offset="100%" stop-color="#1C2340"/>
    </linearGradient>

    <radialGradient id="glow" cx="82%" cy="45%" r="55%">
      <stop offset="100%" stop-color="#D4A657" stop-opacity="0"/>
    </radialGradient>

    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.1" fill="#7DE0D3" opacity="0.06"/>
    </pattern>

    <clipPath id="frame">
      <rect width="1200" height="280" rx="14"/>
    </clipPath>
  </defs>

  <g clip-path="url(#frame)">
    <!-- base -->
    <rect width="1200" height="280" fill="url(#bg)"/>
    <rect width="1200" height="280" fill="url(#dots)"/>
    <rect width="1200" height="280" fill="url(#glow)"/>

    <!-- left content block -->
    <g font-family="'Cascadia Code','SF Mono',Consolas,'Courier New',monospace">
      <text x="64" y="86" font-size="19" fill="#5EEAD4" letter-spacing="0.5" textLength="212" lengthAdjust="spacingAndGlyphs">
        <tspan>darsh@uc</tspan><tspan fill="#4B5670">:</tspan><tspan fill="#8CA0FF">~</tspan><tspan fill="#4B5670">$</tspan>
        <tspan fill="#E8E6DF"> whoami</tspan>
      </text>
      <rect x="278" y="69" width="10" height="18" fill="#5EEAD4">
        <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.45;0.5;0.95;1" dur="1.1s" repeatCount="indefinite"/>
      </rect>
    </g>

    <text x="62" y="150" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="54" font-weight="700" fill="#F2EFE9" letter-spacing="0.5">
      Darsh Gandhi
    </text>

    <rect x="64" y="172" width="120" height="2.5" fill="#D4A657" opacity="0.75"/>

    <text x="64" y="205" font-family="'Cascadia Code','SF Mono',Consolas,monospace" font-size="18" fill="#B7BFD6">
      Software Engineering Student · University of Canterbury, NZ
    </text>

    <g font-family="'Cascadia Code','SF Mono',Consolas,monospace" font-size="14.5" fill="#8A93AB">
      <text x="64" y="236">full-stack development</text>
    </g>

    <!-- frame hairline -->
    <rect x="0.75" y="0.75" width="1198.5" height="278.5" rx="13.5" fill="none" stroke="#2A3155" stroke-width="1.5"/>
  </g>
</svg>
